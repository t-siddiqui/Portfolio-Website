# Use a modern, stable Node.js runtime
runtime: nodejs20

handlers:
  # Serve all static files (like CSS, JS, images) from the 'build' directory
  - url: /(.*\..+)$
    static_files: build/\1
    upload: build/(.*\..+)$

  # The "catch-all" handler. This is for SPA routing (React Router).
  # It serves the index.html for any URL that isn't a static file.
  - url: /.*
    static_files: build/index.html
    upload: build/index.html